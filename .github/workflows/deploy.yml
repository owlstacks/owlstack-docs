name: Deploy Docs to Server

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push docs
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ghcr.io/owlstacks/owlstack-docs:latest
          cache-from: type=gha,scope=docs
          cache-to: type=gha,mode=max,scope=docs

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy to server
        timeout-minutes: 10
        run: |
          ssh -i ~/.ssh/deploy_key "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}" <<'DEPLOY_SCRIPT'
            set -e
            export PATH=$PATH:/usr/local/bin:/usr/bin

            echo "=========================================="
            echo "OwlStack Docs Deploy — $(date)"
            echo "=========================================="

            cd "${{ secrets.DEPLOY_PATH }}"

            echo ">>> Logging in to GHCR..."
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u "${{ secrets.GHCR_USER }}" --password-stdin

            echo ">>> Pulling latest docs image..."
            docker compose -f docker-compose.yml pull docs

            echo ">>> Restarting docs service..."
            docker compose -f docker-compose.yml up -d docs

            docker image prune -f

            echo "=========================================="
            echo "Docs deploy complete!"
            echo "=========================================="
          DEPLOY_SCRIPT

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key
